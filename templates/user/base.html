{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Reasonable Or Not{% endblock %}</title>
    <link rel="icon" href="{% static 'img/favicon.svg' %}" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/apple-style.css' %}">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="site-shell">
        <header class="topbar">
            <a class="brand" href="{% url 'index' %}">
                <span class="brand-mark">R/N</span>
                <span class="brand-copy">
                    <strong>Reasonable Or Not</strong>
                    <small>Phone recommendation showcase</small>
                </span>
            </a>
            <nav class="topnav">
                <a href="{% url 'index' %}" {% if request.path == '/user/index' %}class="active"{% endif %}>Home</a>
                <a href="{% url 'requirement' %}" {% if request.path == '/user/requirement' %}class="active"{% endif %}>Try Demo</a>
                <a href="{% url 'result' %}" {% if request.path == '/user/result' %}class="active"{% endif %}>Method</a>
                <a href="https://github.com/lennney/ReasonableOrNot" target="_blank" rel="noopener noreferrer" class="github-icon" aria-label="GitHub">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                    </svg>
                </a>
            </nav>
        </header>
        {% block content %}{% endblock %}
    </div>
    <script src="{% static 'js/cursor-glow.js' %}"></script>
    <script src="{% static 'js/custom-select.js' %}"></script>
    <script>
    document.querySelectorAll('.preference-form').forEach(function(form) {
        form.addEventListener('submit', function() {
            var btn = document.getElementById('submit-btn');
            if (btn) {
                btn.classList.add('loading');
                btn.disabled = true;
            }
        });
    });
    </script>
</body>
</html>
