{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Reasonable Or Not{% endblock %}</title>
    <link rel="icon" href="{% static 'img/favicon.svg' %}" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/apple-style.css' %}">
</head>
<body>
    <div class="site-shell">
        <header class="topbar">
            <a class="brand" href="{% url 'index' %}">
                <span class="brand-mark">R/N</span>
                <span class="brand-copy">
                    <strong>Reasonable Or Not</strong>
                    <small>Phone recommendation showcase</small>
                </span>
            </a>
            <nav class="topnav">
                <a href="{% url 'index' %}">Home</a>
                <a href="{% url 'requirement' %}">Try Demo</a>
                <a href="{% url 'result' %}">Method</a>
                {% if username %}
                    <a href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a class="nav-cta" href="{% url 'register' %}">Register</a>
                {% endif %}
            </nav>
        </header>
        {% block content %}{% endblock %}
    </div>
    <script src="{% static 'js/custom-select.js' %}"></script>
</body>
</html>
